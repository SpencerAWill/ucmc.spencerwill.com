services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - pnpm-store:/home/vscode/.local/share/pnpm/store
      - pulumi-config:/home/vscode/.pulumi
      - gh-config:/home/vscode/.config/gh
      - claude-data:/home/vscode/.claude
      - command-history:/commandhistory
    command: sleep infinity

volumes:
  pnpm-store:
  pulumi-config:
  gh-config:
  claude-data:
  command-history:

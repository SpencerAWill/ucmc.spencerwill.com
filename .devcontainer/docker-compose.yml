services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    environment:
      # Merge host process env into Worker dev bindings so host-exported
      # vars reach `pnpm --filter ucmc-web dev` through the
      # @cloudflare/vite-plugin. Host values win over apps/web/.env*.
      CLOUDFLARE_INCLUDE_PROCESS_ENV: "true"
      # Host-shell passthroughs for local Worker secrets. `${VAR:-}` means
      # "empty if unset on host" — apps/web/.env.local then fills in.
      SESSION_SECRET: "${SESSION_SECRET:-}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
    volumes:
      - ..:/workspace:cached
      - pnpm-store:/home/vscode/.local/share/pnpm/store
      - pulumi-config:/home/vscode/.pulumi
      # Bind-mount host's gh auth so the container inherits `gh auth login`
      # from the host. Requires the token to live in ~/.config/gh/hosts.yml
      # (Linux/WSL default; on macOS run `gh auth login --insecure-storage`
      # on the host once, since Keychain-stored tokens don't cross the mount).
      - ${HOME}/.config/gh:/home/vscode/.config/gh:cached
      - claude-data:/home/vscode/.claude
      - command-history:/commandhistory
      - playwright-browsers:/home/vscode/.cache/ms-playwright
    command: sleep infinity
    depends_on:
      - mailpit

  # Mailpit catches outbound dev email so magic links land in a real
  # inbox UI (http://localhost:8025) instead of the wrangler terminal.
  # The web app POSTs messages to Mailpit's HTTP send API
  # (`POST /api/v1/send`) when MAILPIT_URL is set; see
  # apps/web/src/server/email/resend.ts. The SMTP listener on 1025 is
  # unused today but exposed for future tooling that speaks SMTP.
  # Playwright e2e tests poll Mailpit's REST API to retrieve magic-link
  # tokens during sign-in flows.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025" # Web UI + REST API
      - "1025:1025" # SMTP intake
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      # Bound the inbox so a long-running container can't grow without
      # limit. Tests clear via DELETE /api/v1/messages anyway.
      MP_MAX_MESSAGES: "500"
    volumes:
      - mailpit-data:/data

volumes:
  pnpm-store:
  pulumi-config:
  claude-data:
  command-history:
  playwright-browsers:
  mailpit-data:

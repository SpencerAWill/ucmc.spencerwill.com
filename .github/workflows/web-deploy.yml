name: Web Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "libs/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/web-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

jobs:
  deploy-dev:
    name: Deploy Web to Dev
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    environment: dev
    concurrency:
      group: web-deploy-dev
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Pulumi is the source of truth for the D1 database UUID. Must run
      # BEFORE build because @cloudflare/vite-plugin snapshots wrangler.jsonc
      # into dist/server/wrangler.json at build time; `wrangler deploy` reads
      # that snapshot, not the source file. Injecting after build would leave
      # the placeholder UUID in the deployed artifact.
      - uses: pulumi/setup-pulumi@v2

      - name: Fetch D1 database ID from Pulumi
        id: d1
        working-directory: infra
        run: |
          pulumi stack select dev
          echo "database_id=$(pulumi stack output d1DatabaseId)" >> "$GITHUB_OUTPUT"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Inject D1 UUID into wrangler.jsonc
        run: sed -i 's/00000000-0000-0000-0000-000000000000/${{ steps.d1.outputs.database_id }}/' apps/web/wrangler.jsonc

      - name: Build (dev env)
        # Top-level wrangler.jsonc config IS the dev worker, so CLOUDFLARE_ENV
        # must be unset here — setting it to "dev" would make
        # @cloudflare/vite-plugin look up a nonexistent env.dev override.
        run: pnpm --filter ucmc-web build

      - name: Apply D1 migrations (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: d1 migrations apply ucmc-web-dev --remote

      - name: Deploy Worker (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy

  deploy-prod:
    name: Deploy Web to Prod
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    environment: prod
    concurrency:
      group: web-deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: pulumi/setup-pulumi@v2

      - name: Fetch D1 database ID from Pulumi
        id: d1
        working-directory: infra
        run: |
          pulumi stack select prod
          echo "database_id=$(pulumi stack output d1DatabaseId)" >> "$GITHUB_OUTPUT"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Inject D1 UUID into wrangler.jsonc
        run: sed -i 's/11111111-1111-1111-1111-111111111111/${{ steps.d1.outputs.database_id }}/' apps/web/wrangler.jsonc

      - name: Build (production env)
        run: pnpm --filter ucmc-web build
        env:
          CLOUDFLARE_ENV: production

      - name: Apply D1 migrations (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: d1 migrations apply ucmc-web --env production --remote

      - name: Deploy Worker (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy --env production

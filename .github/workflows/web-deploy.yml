name: Web Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "libs/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/web-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

jobs:
  deploy-dev:
    name: Deploy Web to Dev
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    environment: dev
    concurrency:
      group: web-deploy-dev
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Pulumi is the source of truth for the D1 database UUID and the KV
      # namespace UUID. Must run BEFORE build because @cloudflare/vite-plugin
      # snapshots wrangler.jsonc into dist/server/wrangler.json at build
      # time; `wrangler deploy` reads that snapshot, not the source file.
      # Injecting after build would leave placeholder UUIDs in the deployed
      # artifact.
      - uses: pulumi/setup-pulumi@v2

      - name: Fetch resource IDs and vars from Pulumi
        id: pulumi
        working-directory: infra
        run: |
          pulumi stack select dev
          {
            echo "database_id=$(pulumi stack output d1DatabaseId)"
            echo "kv_id=$(pulumi stack output kvNamespaceId)"
            echo "app_base_url=$(pulumi stack output appBaseUrl)"
            echo "webauthn_rp_id=$(pulumi stack output webauthnRpId)"
            echo "webauthn_rp_name=$(pulumi stack output webauthnRpName)"
            echo "resend_from=$(pulumi stack output resendFromEmail)"
            echo "resend_from_name=$(pulumi stack output resendFromName)"
            echo "turnstile_site_key=$(pulumi stack output turnstileSiteKey)"
          } >> "$GITHUB_OUTPUT"
          # Secret outputs: masked in job logs, used only as env vars for
          # the deploy step. `--show-secrets` is required to get plaintext.
          echo "::add-mask::$(pulumi stack output resendApiKey --show-secrets)"
          echo "resend_api_key=$(pulumi stack output resendApiKey --show-secrets)" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$(pulumi stack output turnstileSecretKey --show-secrets)"
          echo "turnstile_secret_key=$(pulumi stack output turnstileSecretKey --show-secrets)" >> "$GITHUB_OUTPUT"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Inject D1 UUID into wrangler.jsonc
        run: sed -i 's/00000000-0000-0000-0000-000000000000/${{ steps.pulumi.outputs.database_id }}/' apps/web/wrangler.jsonc

      - name: Inject KV UUID into wrangler.jsonc
        run: sed -i 's/22222222-2222-2222-2222-222222222222/${{ steps.pulumi.outputs.kv_id }}/' apps/web/wrangler.jsonc

      - name: Build (dev env)
        # Top-level wrangler.jsonc config IS the dev worker, so CLOUDFLARE_ENV
        # must be unset here — setting it to "dev" would make
        # @cloudflare/vite-plugin look up a nonexistent env.dev override.
        run: pnpm --filter ucmc-web build
        env:
          VITE_TURNSTILE_SITE_KEY: ${{ steps.pulumi.outputs.turnstile_site_key }}

      - name: Apply D1 migrations (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: d1 migrations apply ucmc-web-dev --remote

      # Secrets are uploaded via `wrangler secret put` (one call per name)
      # immediately before `wrangler deploy`. SESSION_SECRET and
      # TURNSTILE_SECRET_KEY come from the GitHub `dev` environment;
      # RESEND_API_KEY comes from the Pulumi stack output (the
      # sending-scoped key that the ResendDomain component issues),
      # masked above so it doesn't leak in job logs.
      - name: Deploy Worker (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          secrets: |
            SESSION_SECRET
            RESEND_API_KEY
            TURNSTILE_SECRET_KEY
          command: >-
            deploy
            --var APP_BASE_URL:${{ steps.pulumi.outputs.app_base_url }}
            --var WEBAUTHN_RP_ID:${{ steps.pulumi.outputs.webauthn_rp_id }}
            --var WEBAUTHN_RP_NAME:${{ steps.pulumi.outputs.webauthn_rp_name }}
            --var RESEND_FROM:${{ steps.pulumi.outputs.resend_from }}
            --var RESEND_FROM_NAME:${{ steps.pulumi.outputs.resend_from_name }}
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          RESEND_API_KEY: ${{ steps.pulumi.outputs.resend_api_key }}
          TURNSTILE_SECRET_KEY: ${{ steps.pulumi.outputs.turnstile_secret_key }}

  deploy-prod:
    name: Deploy Web to Prod
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    environment: prod
    concurrency:
      group: web-deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: pulumi/setup-pulumi@v2

      - name: Fetch resource IDs and vars from Pulumi
        id: pulumi
        working-directory: infra
        run: |
          pulumi stack select prod
          {
            echo "database_id=$(pulumi stack output d1DatabaseId)"
            echo "kv_id=$(pulumi stack output kvNamespaceId)"
            echo "app_base_url=$(pulumi stack output appBaseUrl)"
            echo "webauthn_rp_id=$(pulumi stack output webauthnRpId)"
            echo "webauthn_rp_name=$(pulumi stack output webauthnRpName)"
            echo "resend_from=$(pulumi stack output resendFromEmail)"
            echo "resend_from_name=$(pulumi stack output resendFromName)"
            echo "turnstile_site_key=$(pulumi stack output turnstileSiteKey)"
          } >> "$GITHUB_OUTPUT"
          echo "::add-mask::$(pulumi stack output resendApiKey --show-secrets)"
          echo "resend_api_key=$(pulumi stack output resendApiKey --show-secrets)" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$(pulumi stack output turnstileSecretKey --show-secrets)"
          echo "turnstile_secret_key=$(pulumi stack output turnstileSecretKey --show-secrets)" >> "$GITHUB_OUTPUT"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Inject D1 UUID into wrangler.jsonc
        run: sed -i 's/11111111-1111-1111-1111-111111111111/${{ steps.pulumi.outputs.database_id }}/' apps/web/wrangler.jsonc

      - name: Inject KV UUID into wrangler.jsonc
        run: sed -i 's/33333333-3333-3333-3333-333333333333/${{ steps.pulumi.outputs.kv_id }}/' apps/web/wrangler.jsonc

      - name: Build (production env)
        run: pnpm --filter ucmc-web build
        env:
          CLOUDFLARE_ENV: production
          VITE_TURNSTILE_SITE_KEY: ${{ steps.pulumi.outputs.turnstile_site_key }}

      - name: Apply D1 migrations (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: d1 migrations apply ucmc-web --env production --remote

      # SESSION_SECRET comes from the GitHub `prod` environment;
      # RESEND_API_KEY and TURNSTILE_SECRET_KEY come from Pulumi stack
      # outputs (the sending-scoped key and widget secret, respectively),
      # fetched and masked above.
      - name: Deploy Worker (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          secrets: |
            SESSION_SECRET
            RESEND_API_KEY
            TURNSTILE_SECRET_KEY
          command: >-
            deploy --env production
            --var APP_BASE_URL:${{ steps.pulumi.outputs.app_base_url }}
            --var WEBAUTHN_RP_ID:${{ steps.pulumi.outputs.webauthn_rp_id }}
            --var WEBAUTHN_RP_NAME:${{ steps.pulumi.outputs.webauthn_rp_name }}
            --var RESEND_FROM:${{ steps.pulumi.outputs.resend_from }}
            --var RESEND_FROM_NAME:${{ steps.pulumi.outputs.resend_from_name }}
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          RESEND_API_KEY: ${{ steps.pulumi.outputs.resend_api_key }}
          TURNSTILE_SECRET_KEY: ${{ steps.pulumi.outputs.turnstile_secret_key }}

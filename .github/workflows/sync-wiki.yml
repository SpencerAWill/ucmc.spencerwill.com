name: Sync Wiki Submodule

on:
  # GitHub fires `gollum` when wiki pages are created/edited
  gollum:
  # Fallback: run daily in case gollum events are missed
  schedule:
    - cron: "0 6 1,15 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update wiki submodule
        run: git submodule update --remote --merge .wiki

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .wiki
          git commit -m "chore(wiki): sync submodule"
          git push
